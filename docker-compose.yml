name: final-project-iot

services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=ee-iot
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    restart: always

  api-server:
    image: dmfsho/api-server:latest
    ports:
      - "5000:5000"
    restart: always

  mqtt-subserver:
    image: dmfsho/mqtt-subserver:latest
    ports:
      - "1883:1883"
    restart: always

  database-server:
    image: dmfsho/database-server:latest
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=my-super-secret-auth-token
      - INFLUXDB_ORG=ee-iot
      - INFLUXDB_BUCKET=sensor_data
    depends_on:
      - influxdb
    restart: always